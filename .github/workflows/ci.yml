name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: go test ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
      - name: Cross-compile check
        run: |
          GOOS=linux GOARCH=amd64 go build ./cmd/sunbeams
          GOOS=linux GOARCH=arm64 go build ./cmd/sunbeams
